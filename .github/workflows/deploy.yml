name: Deploy Vite Project

on:
  push:
    branches: ["main"] # あなたのメインブランチ名に合わせてください

permissions:
  contents: read
  pages: write
  id-token: write

jobs:
  build:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: ./tips-tips # ここを実際のフォルダ名に変更！
    steps:
      - name: Checkout
        uses: actions/checkout@v4
      - name: Set up Node
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: 'npm'
          cache-dependency-path: './tips-tips/package-lock.json' # ここも変更！
      - name: Install dependencies
        run: npm install
      - name: Build
        run: npm run build
      - name: Setup Pages
        uses: actions/configure-pages@v4
      - name: Upload artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: './tips-tips/dist' # ビルド結果の場所を指定
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4