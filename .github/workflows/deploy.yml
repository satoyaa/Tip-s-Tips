name: Deploy Vite Project

on:
  push:
    branches: ["main"]

permissions:
  contents: read
  pages: write
  id-token: write

jobs:
  # 1. ビルドを行うジョブ
  build:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: ./tips-tips # 変更してください
    steps:
      - name: Checkout
        uses: actions/checkout@v4
      - name: Set up Node
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: 'npm'
          cache-dependency-path: './tips-tips/package-lock.json' # 変更してください
      - name: Install dependencies
        run: npm install
      - name: Build
        run: npm run build
      - name: Upload artifact
        uses: actions/upload-pages-artifact@v3
        with:
          # ここはリポジトリのルートからのパスを書きます
          path: './tips-tips/dist'

  # 2. 公開を行うジョブ
  deploy:
    needs: build
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4